resources:
  jobs:
    omop_cdm_build:
      name: "[${bundle.target}] OMOP CDM Build"
      timeout_seconds: 7200
      max_concurrent_runs: 1
      tags:
        usage: solacc
        group: HLS
        project: omop-cdm

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: bronze_schema
          default: ${var.bronze_schema}
        - name: omop_schema
          default: ${var.omop_schema}
        - name: results_schema
          default: ${var.results_schema}
        - name: landing_volume
          default: ${var.landing_volume}
        - name: project
          default: ${var.project_profile}
        - name: source_path
          default: ""

      # Shared serverless environment. Assigned to every task that executes
      # Python code — including the SQL notebooks, whose config headers use
      # `%python` cells to read widgets and set the active catalog/schema.
      environments:
        - environment_key: omop_env
          spec:
            client: "2"
            dependencies:
              - plotly==5.24.1

      tasks:
        - task_key: readme
          notebook_task:
            notebook_path: ../0-README.py
            source: WORKSPACE

        - task_key: setup
          depends_on:
            - task_key: readme
          environment_key: omop_env
          notebook_task:
            notebook_path: ../00-setup.py
            source: WORKSPACE
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              bronze_schema: "{{job.parameters.bronze_schema}}"
              omop_schema: "{{job.parameters.omop_schema}}"
              results_schema: "{{job.parameters.results_schema}}"
              landing_volume: "{{job.parameters.landing_volume}}"
              project: "{{job.parameters.project}}"
              source_path: "{{job.parameters.source_path}}"

        - task_key: data_ingest
          depends_on:
            - task_key: setup
          environment_key: omop_env
          notebook_task:
            notebook_path: ../1-data-ingest.py
            source: WORKSPACE
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              bronze_schema: "{{job.parameters.bronze_schema}}"
              landing_volume: "{{job.parameters.landing_volume}}"
              project: "{{job.parameters.project}}"
              source_path: "{{tasks.setup.values.source_path}}"

        - task_key: cdm_setup
          depends_on:
            - task_key: data_ingest
          environment_key: omop_env
          notebook_task:
            notebook_path: ../2-omop531-cdm-setup.sql
            source: WORKSPACE
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              omop_schema: "{{job.parameters.omop_schema}}"
              results_schema: "{{job.parameters.results_schema}}"
              bronze_schema: "{{job.parameters.bronze_schema}}"

        - task_key: vocab_setup
          depends_on:
            - task_key: cdm_setup
          environment_key: omop_env
          notebook_task:
            notebook_path: ../3-omop-vocab-setup.sql
            source: WORKSPACE
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              omop_schema: "{{job.parameters.omop_schema}}"
              bronze_schema: "{{job.parameters.bronze_schema}}"
              landing_volume: "{{job.parameters.landing_volume}}"

        - task_key: etl_synthea
          depends_on:
            - task_key: vocab_setup
          environment_key: omop_env
          notebook_task:
            notebook_path: ../4-omop531-etl-synthea.sql
            source: WORKSPACE
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              bronze_schema: "{{job.parameters.bronze_schema}}"
              omop_schema: "{{job.parameters.omop_schema}}"

        - task_key: chf_cohort
          depends_on:
            - task_key: etl_synthea
          environment_key: omop_env
          notebook_task:
            notebook_path: ../5-CHF-cohort-building.py
            source: WORKSPACE
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              omop_schema: "{{job.parameters.omop_schema}}"
              results_schema: "{{job.parameters.results_schema}}"

        - task_key: drug_analysis
          depends_on:
            - task_key: chf_cohort
          environment_key: omop_env
          notebook_task:
            notebook_path: ../6-drug-analysis.py
            source: WORKSPACE
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              omop_schema: "{{job.parameters.omop_schema}}"
              results_schema: "{{job.parameters.results_schema}}"

        - task_key: sample_queries
          depends_on:
            - task_key: drug_analysis
          environment_key: omop_env
          notebook_task:
            notebook_path: ../7-sample-omop-queries.sql
            source: WORKSPACE
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              omop_schema: "{{job.parameters.omop_schema}}"
              results_schema: "{{job.parameters.results_schema}}"

      schedule:
        quartz_cron_expression: ${var.schedule_cron}
        timezone_id: ${var.schedule_timezone}
        pause_status: ${var.schedule_pause_status}

      email_notifications:
        on_failure:
          - ${var.notifications_email}
        no_alert_for_skipped_runs: true

      # Slack notifications via pre-created notification destinations.
      # Override `slack_webhook_destinations` per target to enable; defaults to [].
      webhook_notifications:
        on_failure: ${var.slack_webhook_destinations}
        on_success: ${var.slack_webhook_destinations}

      permissions:
        - level: CAN_VIEW
          group_name: users
